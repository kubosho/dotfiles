"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
scan_timeout = 10

format = """
[Óā∂](fg:north)\
$directory\
${custom.jj}\
$git_branch\
$git_status\
[Óāī](fg:north) \
$character\
"""

palette = 'trapezium'
[palettes.trapezium]
east = '#83cbec'
west = '#feca8b'
south = '#f57988'
north = '#58c3a9'
text = '#1a1b26'

[directory]
format = "[ $path$read_only](bg:north fg:text bold)"

# Jujutsu VCS integration
[custom.jj]
description = "Jujutsu VCS status"
command = '''
jj log -r @ -n1 --no-graph --ignore-working-copy -T '
separate(" ",
  bookmarks.map(|x| if(x.remote(), "", x.name())).join(" "),
  tags.map(|x| x.name()).join(" "),
  if(conflict, "ůįÄ®"),
  if(divergent, "ůįďĘ"),
  if(hidden, "ůįąČ"),
  if(empty, "‚óč", "‚óŹ"),
  surround("\"", "\"", truncate_end(24, description.first_line(), "‚Ä¶")),
)
'
'''
when = 'jj root --ignore-working-copy 2>/dev/null'
detect_folders = [".jj"]
symbol = "ūü•č"
format = "[ ÓāĹ $symbol$output](bg:north fg:text bold)"
shell = ["sh", "--norc", "--noprofile"]

[git_branch]
format = "[ ÓāĹ $symbol$branch](bg:north fg:text bold)"

[git_status]
format = "[$all_status$ahead_behind](bg:north fg:text bold)"

[character]
success_symbol = "[‚ĚĮ](west)"
error_symbol = "[‚ĚĮ](south)"
